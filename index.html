<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow — Get things done</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:    #0e0e10;
    --paper:  #f5f3ee;
    --accent: #d4522a;
    --muted:  #7a7870;
    --card:   #ffffff;
    --border: #e2dfd8;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  /* ── Left panel ── */
  .hero {
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: var(--ink);
    color: var(--paper);
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: var(--accent);
    opacity: .08;
    top: -120px; right: -120px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -.5px;
  }

  .logo span { color: var(--accent); }

  .hero-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 60px 0; }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(42px, 5vw, 64px);
    line-height: 1.05;
    margin-bottom: 24px;
    animation: fadeUp .6s ease both;
  }

  h1 em { color: var(--accent); font-style: normal; }

  .tagline {
    font-size: 17px;
    color: #a8a49c;
    line-height: 1.7;
    max-width: 360px;
    animation: fadeUp .6s .1s ease both;
  }

  .badges {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    animation: fadeUp .6s .2s ease both;
  }

  .badge {
    padding: 6px 14px;
    border: 1px solid #2e2e32;
    border-radius: 20px;
    font-size: 13px;
    color: #7a7870;
  }

  /* ── Right panel ── */
  .auth-panel {
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .auth-card {
    width: 100%;
    max-width: 400px;
  }

  .tabs {
    display: flex;
    border-bottom: 2px solid var(--border);
    margin-bottom: 32px;
  }

  .tab {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 15px;
    padding: 10px 0;
    margin-right: 28px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color .2s, border-color .2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .tab.active { color: var(--ink); border-bottom-color: var(--accent); }

  .form-group { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }

  input[type=text], input[type=email], input[type=password] {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    background: var(--card);
    color: var(--ink);
    transition: border-color .2s;
    outline: none;
  }

  input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    margin-top: 8px;
  }

  .btn-primary:hover { opacity: .9; }
  .btn-primary:active { transform: scale(.99); }

  .error-msg {
    background: #fef2f2;
    border: 1px solid #fca5a5;
    color: #b91c1c;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .form-pane { display: none; }
  .form-pane.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 768px) {
    body { grid-template-columns: 1fr; }
    .hero { display: none; }
    .auth-panel { padding: 40px 24px; }
  }
</style>
</head>
<body>

<!-- Left -->
<div class="hero">
  <div class="logo">Task<span>Flow</span></div>
  <div class="hero-body">
    <h1>Manage tasks.<br><em>Ship faster.</em></h1>
    <p class="tagline">A clean kanban-style task manager with priorities, statuses, and real-time stats — all synced to your account.</p>
  </div>
  <div class="badges">
    <span class="badge">PostgreSQL</span>
    <span class="badge">Flask REST API</span>
    <span class="badge">Azure App Service</span>
    <span class="badge">GitHub Actions CI/CD</span>
  </div>
</div>

<!-- Right -->
<div class="auth-panel">
  <div class="auth-card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign in</button>
      <button class="tab" onclick="switchTab('register')">Create account</button>
    </div>

    <div id="error-box" class="error-msg"></div>

    <!-- Login -->
    <div id="pane-login" class="form-pane active">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••"/>
      </div>
      <button class="btn-primary" onclick="doLogin()">Sign in →</button>
    </div>

    <!-- Register -->
    <div id="pane-register" class="form-pane">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="yourname"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="min 6 characters"/>
      </div>
      <button class="btn-primary" onclick="doRegister()">Create account →</button>
    </div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('pane-login').classList.toggle('active', tab==='login');
  document.getElementById('pane-register').classList.toggle('active', tab==='register');
  hideError();
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = msg;
  box.style.display = 'block';
}

function hideError() { document.getElementById('error-box').style.display = 'none'; }

async function doLogin() {
  hideError();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showError('Please fill in all fields.');
  const res = await fetch('/api/login', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({email, password})
  });
  const data = await res.json();
  if (!res.ok) return showError(data.error || 'Login failed.');
  window.location.href = '/dashboard';
}

async function doRegister() {
  hideError();
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!username || !email || !password) return showError('Please fill in all fields.');
  if (password.length < 6) return showError('Password must be at least 6 characters.');
  const res = await fetch('/api/register', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({username, email, password})
  });
  const data = await res.json();
  if (!res.ok) return showError(data.error || 'Registration failed.');
  window.location.href = '/dashboard';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const active = document.querySelector('.form-pane.active');
    if (active.id === 'pane-login') doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
