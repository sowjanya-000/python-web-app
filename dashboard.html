<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink:    #0e0e10;
    --paper:  #f5f3ee;
    --accent: #d4522a;
    --muted:  #7a7870;
    --card:   #ffffff;
    --border: #e2dfd8;
    --sidebar-w: 240px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); display: flex; min-height: 100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--ink);
    color: var(--paper);
    display: flex;
    flex-direction: column;
    padding: 32px 24px;
    position: fixed;
    top: 0; left: 0; bottom: 0;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; margin-bottom: 40px; }
  .logo span { color: var(--accent); }
  .nav-label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: #55534e; margin-bottom: 10px; font-weight: 500; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; color: #a8a49c; transition: background .15s, color .15s; margin-bottom: 2px; text-decoration: none; }
  .nav-item:hover { background: #1c1c1f; color: var(--paper); }
  .nav-item.active { background: var(--accent); color: white; }
  .nav-icon { font-size: 16px; }
  .sidebar-footer { margin-top: auto; }
  .user-chip { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; background: #1c1c1f; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: white; flex-shrink: 0; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 500; color: var(--paper); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .logout-btn { background: none; border: none; color: #55534e; cursor: pointer; font-size: 14px; padding: 4px; transition: color .15s; }
  .logout-btn:hover { color: var(--accent); }

  /* ── Main ── */
  .main { margin-left: var(--sidebar-w); flex: 1; padding: 40px 48px; }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 36px; }
  .page-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 32px; }
  .page-sub { color: var(--muted); font-size: 14px; margin-top: 4px; }
  .btn-new { display: flex; align-items: center; gap: 8px; padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: opacity .15s; }
  .btn-new:hover { opacity: .88; }

  /* ── Stats ── */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 36px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }
  .stat-value { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 32px; }
  .stat-value.accent { color: var(--accent); }

  /* ── Board ── */
  .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .column { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; min-height: 400px; }
  .col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .col-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .col-dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-todo  { background: #94a3b8; }
  .dot-doing { background: #f59e0b; }
  .dot-done  { background: #22c55e; }
  .col-count { font-size: 12px; color: var(--muted); background: var(--paper); padding: 2px 8px; border-radius: 20px; }
  .task-list { display: flex; flex-direction: column; gap: 10px; }

  /* ── Task card ── */
  .task-card { background: var(--paper); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: box-shadow .15s, transform .1s; position: relative; }
  .task-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); transform: translateY(-1px); }
  .task-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; line-height: 1.4; }
  .task-desc { font-size: 12px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-meta { display: flex; align-items: center; justify-content: space-between; }
  .priority-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .p-low    { background: #f0fdf4; color: #15803d; }
  .p-medium { background: #fffbeb; color: #92400e; }
  .p-high   { background: #fef2f2; color: #b91c1c; }
  .task-date { font-size: 11px; color: var(--muted); }
  .task-delete { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #c4c0bb; cursor: pointer; font-size: 14px; opacity: 0; transition: opacity .15s, color .15s; }
  .task-card:hover .task-delete { opacity: 1; }
  .task-delete:hover { color: var(--accent); }

  /* ── Modal ── */
  .overlay { position: fixed; inset: 0; background: rgba(14,14,16,.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; }
  .overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: 16px; padding: 32px; width: 480px; max-width: 94vw; animation: pop .2s ease; }
  @keyframes pop { from { opacity:0; transform:scale(.96); } to { opacity:1; transform:scale(1); } }
  .modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; }
  input[type=text], textarea, select {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
    border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--paper); color: var(--ink); outline: none; transition: border-color .2s;
  }
  input[type=text]:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn-cancel { flex: 1; padding: 12px; background: var(--paper); border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; transition: background .15s; }
  .btn-cancel:hover { background: var(--border); }
  .btn-save { flex: 2; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: opacity .15s; }
  .btn-save:hover { opacity: .88; }

  .empty-col { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }

  @media (max-width: 900px) {
    .board { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .main { padding: 24px; }
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">Task<span>Flow</span></div>
  <div class="nav-label">Menu</div>
  <a class="nav-item active" href="/dashboard"><span class="nav-icon">⬛</span> Board</a>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="avatar" id="avatar-letter">?</div>
      <div class="user-info">
        <div class="user-name" id="sidebar-username">Loading…</div>
      </div>
      <button class="logout-btn" onclick="doLogout()" title="Sign out">⏻</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">My Board</div>
      <div class="page-sub">Drag tasks through columns as you work</div>
    </div>
    <button class="btn-new" onclick="openModal()">＋ New Task</button>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total tasks</div><div class="stat-value" id="s-total">–</div></div>
    <div class="stat-card"><div class="stat-label">To do</div><div class="stat-value" id="s-todo">–</div></div>
    <div class="stat-card"><div class="stat-label">In progress</div><div class="stat-value accent" id="s-doing">–</div></div>
    <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" id="s-done">–</div></div>
  </div>

  <!-- Board -->
  <div class="board">
    <div class="column">
      <div class="col-header">
        <div class="col-title"><span class="col-dot dot-todo"></span>To Do</div>
        <span class="col-count" id="cnt-todo">0</span>
      </div>
      <div class="task-list" id="col-todo"></div>
    </div>
    <div class="column">
      <div class="col-header">
        <div class="col-title"><span class="col-dot dot-doing"></span>In Progress</div>
        <span class="col-count" id="cnt-doing">0</span>
      </div>
      <div class="task-list" id="col-doing"></div>
    </div>
    <div class="column">
      <div class="col-header">
        <div class="col-title"><span class="col-dot dot-done"></span>Done</div>
        <span class="col-count" id="cnt-done">0</span>
      </div>
      <div class="task-list" id="col-done"></div>
    </div>
  </div>
</main>

<!-- New Task Modal -->
<div class="overlay" id="modal-overlay" onclick="closeOnBg(event)">
  <div class="modal">
    <div class="modal-title">New Task</div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="t-title" placeholder="What needs to be done?"/>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="t-desc" placeholder="Optional details…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Priority</label>
        <select id="t-priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="t-status">
          <option value="todo" selected>To Do</option>
          <option value="doing">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<script>
const pmap = { low:'p-low', medium:'p-medium', high:'p-high' };

async function loadUser() {
  const res = await fetch('/api/me');
  if (!res.ok) { window.location.href = '/'; return; }
  const u = await res.json();
  document.getElementById('sidebar-username').textContent = u.username;
  document.getElementById('avatar-letter').textContent = u.username[0].toUpperCase();
}

async function loadStats() {
  const res = await fetch('/api/stats');
  const s = await res.json();
  document.getElementById('s-total').textContent = s.total;
  document.getElementById('s-todo').textContent  = s.todo;
  document.getElementById('s-doing').textContent = s.doing;
  document.getElementById('s-done').textContent  = s.done;
}

function taskCard(t) {
  return `
  <div class="task-card" onclick="cycleStatus(${t.id}, '${t.status}')">
    <button class="task-delete" onclick="deleteTask(event,${t.id})">✕</button>
    <div class="task-title">${escHtml(t.title)}</div>
    ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
    <div class="task-meta">
      <span class="priority-badge ${pmap[t.priority]}">${t.priority}</span>
      <span class="task-date">${t.created}</span>
    </div>
  </div>`;
}

async function loadTasks() {
  const res = await fetch('/api/tasks');
  const tasks = await res.json();
  const cols = { todo: [], doing: [], done: [] };
  tasks.forEach(t => (cols[t.status] || cols.todo).push(t));
  ['todo','doing','done'].forEach(s => {
    const el = document.getElementById('col-'+s);
    const cnt = document.getElementById('cnt-'+s);
    el.innerHTML = cols[s].length ? cols[s].map(taskCard).join('') : '<div class="empty-col">No tasks here yet</div>';
    cnt.textContent = cols[s].length;
  });
}

async function cycleStatus(id, current) {
  const next = { todo:'doing', doing:'done', done:'todo' };
  await fetch('/api/tasks/'+id, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ status: next[current] })
  });
  loadTasks(); loadStats();
}

async function deleteTask(e, id) {
  e.stopPropagation();
  if (!confirm('Delete this task?')) return;
  await fetch('/api/tasks/'+id, { method:'DELETE' });
  loadTasks(); loadStats();
}

function openModal() {
  document.getElementById('t-title').value = '';
  document.getElementById('t-desc').value = '';
  document.getElementById('t-priority').value = 'medium';
  document.getElementById('t-status').value = 'todo';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('t-title').focus(), 100);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeOnBg(e) { if (e.target === e.currentTarget) closeModal(); }

async function saveTask() {
  const title = document.getElementById('t-title').value.trim();
  if (!title) { document.getElementById('t-title').focus(); return; }
  await fetch('/api/tasks', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      title,
      description: document.getElementById('t-desc').value.trim(),
      priority: document.getElementById('t-priority').value,
      status: document.getElementById('t-status').value
    })
  });
  closeModal(); loadTasks(); loadStats();
}

async function doLogout() {
  await fetch('/api/logout', { method:'POST' });
  window.location.href = '/';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'n' && !e.target.matches('input,textarea,select')) openModal();
});

loadUser(); loadTasks(); loadStats();
</script>
</body>
</html>
